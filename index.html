<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リベシティ オフィス</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #f2f2f7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
  }

  .header-icon {
    width: 64px;
    height: 64px;
    background: #fff;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    font-size: 30px;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 700;
    color: #1c1c1e;
    letter-spacing: -0.01em;
  }

  .header p {
    font-size: 13px;
    color: #8e8e93;
    margin-top: 4px;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 0;
    width: 100%;
    max-width: 360px;
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
  }

  .card {
    display: flex;
    align-items: center;
    text-decoration: none;
    padding: 16px 20px;
    transition: background 0.15s;
    position: relative;
  }

  .card:not(:last-child)::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 72px;
    right: 0;
    height: 1px;
    background: #f2f2f7;
  }

  .card:active { background: #f2f2f7; }

  .icon-wrap {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    margin-right: 14px;
  }

  .card-umeda    .icon-wrap { background: #fff0eb; }
  .card-yotsubashi .icon-wrap { background: #eef4ff; }
  .card-kobe     .icon-wrap { background: #f5edff; }

  .card-info { flex: 1; min-width: 0; }

  .city {
    font-size: 17px;
    font-weight: 700;
    color: #1c1c1e;
    letter-spacing: -0.01em;
  }

  .sub {
    font-size: 12px;
    color: #8e8e93;
    margin-top: 1px;
    letter-spacing: 0.05em;
  }

  .chevron {
    color: #c7c7cc;
    font-size: 18px;
    font-weight: 500;
    flex-shrink: 0;
  }

  .footer {
    margin-top: 20px;
    font-size: 12px;
    color: #aeaeb2;
    text-align: center;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🏢</div>
  <h1>リベシティ オフィス</h1>
  <p>行きたい拠点を選んでください</p>
</div>

<div class="cards">
  <a href="https://office.libecity.com/places/umeda" target="_blank" class="card card-umeda">
    <div class="icon-wrap">🟠</div>
    <div class="card-info">
      <div class="city">梅田</div>
      <div class="sub">OSAKA · UMEDA</div>
    </div>
    <span class="chevron">›</span>
  </a>
  <a href="https://office.libecity.com/places/yotsubashi" target="_blank" class="card card-yotsubashi">
    <div class="icon-wrap">🔵</div>
    <div class="card-info">
      <div class="city">四ツ橋</div>
      <div class="sub">OSAKA · YOTSUBASHI</div>
    </div>
    <span class="chevron">›</span>
  </a>
  <a href="https://office.libecity.com/places/kobe" target="_blank" class="card card-kobe">
    <div class="icon-wrap">🟣</div>
    <div class="card-info">
      <div class="city">神戸</div>
      <div class="sub">HYOGO · KOBE</div>
    </div>
    <span class="chevron">›</span>
  </a>
</div>

<div class="footer">タップで直接オフィスページへ</div>

</body>
</html>
